<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidel Quest - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --crimson: #8b0000; --cream: #fdf5e6; }
        body { font-family: sans-serif; text-align: center; background: var(--cream); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 4px solid var(--crimson); max-width: 400px; margin: auto; }
        input { padding: 15px; width: 100%; margin-bottom: 15px; font-size: 1.2rem; border-radius: 10px; border: 2px solid #ccc; box-sizing: border-box; }
        button { padding: 18px; background: var(--crimson); color: white; border: none; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .choice-btn { background: #eee; color: var(--crimson); border: 2px solid var(--crimson); height: 80px; font-size: 1.5rem; }
        .choice-btn:active { background: var(--crimson); color: white; }
    </style>
</head>
<body>
    <div id="app" class="card">
        <h1 style="color:var(--crimson)">Fidel Quest ☦️</h1>
        <div id="join-ui">
            <input type="number" id="pInput" placeholder="PIN" inputmode="numeric">
            <input type="text" id="nInput" placeholder="Your Nickname">
            <button onclick="join()">JOIN</button>
        </div>
        <div id="game-ui" style="display:none;">
            <h3 id="msg">Wait for Question...</h3>
            <div id="choices" class="grid"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hmepqrpancugksibgysk.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZXBxcnBhbmN1Z2tzaWJneXNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNjk0NzQsImV4cCI6MjA5Mjc0NTQ3NH0.EMfjuGtTpK_hvGYHouKBunGFitomG_T0buhYmJz7QIU';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function join() {
            const pin = document.getElementById('pInput').value;
            const nick = document.getElementById('nInput').value;
            const { data: session } = await sb.from('game_sessions').select('id').eq('game_pin', pin).eq('status', 'lobby').single();
            
            if (session) {
                await sb.from('players').insert([{ session_id: session.id, nickname: nick }]);
                document.getElementById('join-ui').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                
                sb.channel('updates').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'game_sessions', filter: `id=eq.${session.id}` }, payload => {
                    if (payload.new.status === 'playing') renderButtons(payload.new.current_question_id);
                }).subscribe();
            }
        }

        async function renderButtons(correctId) {
            document.getElementById('msg').innerText = "Pick the match!";
            const { data: choices } = await sb.from('content_library').select('*').limit(4);
            const grid = document.getElementById('choices');
            grid.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'choice-btn';
                b.innerText = c.match_word;
                b.onclick = () => {
                    grid.innerHTML = c.id === correctId ? "<h1>✅ YES!</h1>" : "<h1>❌ NO</h1>";
                    setTimeout(() => { document.getElementById('msg').innerText = "Waiting for next..."; grid.innerHTML=''; }, 2000);
                };
                grid.appendChild(b);
            });
        }
    </script>
</body>
</html>
