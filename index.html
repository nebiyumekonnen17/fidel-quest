<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidel Quest - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --crimson: #8b0000; --cream: #fdf5e6; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--cream); margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 4px solid var(--crimson); width: 100%; max-width: 400px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        input { padding: 15px; width: 100%; margin-bottom: 15px; font-size: 1.2rem; border-radius: 10px; border: 2px solid #ccc; box-sizing: border-box; }
        button { padding: 18px; background: var(--crimson); color: white; border: none; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .choice-btn { background: #fff; color: var(--crimson); border: 3px solid var(--crimson); height: 100px; font-size: 1.6rem; transition: 0.1s; }
        .choice-btn:active { background: var(--crimson); color: white; transform: scale(0.95); }
        #waiting-msg { color: var(--crimson); font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app" class="card">
        <h1 style="color:var(--crimson); margin-top:0;">Fidel Quest ☦️</h1>
        
        <div id="join-ui">
            <input type="number" id="pInput" placeholder="Enter PIN" inputmode="numeric">
            <input type="text" id="nInput" placeholder="Your Nickname">
            <button onclick="join()">JOIN THE QUEST</button>
        </div>

        <div id="game-ui" style="display:none;">
            <h3 id="status-text">Connecting to Priest...</h3>
            <div id="choices" class="grid"></div>
            <p id="waiting-msg">Watch the TV for the Fidel!</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hmepqrpancugksibgysk.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZXBxcnBhbmN1Z2tzaWJneXNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNjk0NzQsImV4cCI6MjA5Mjc0NTQ3NH0.EMfjuGtTpK_hvGYHouKBunGFitomG_T0buhYmJz7QIU';
        
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let currentSessionId = null;

        async function join() {
            const pin = document.getElementById('pInput').value;
            const nick = document.getElementById('nInput').value;

            const { data: session, error } = await sb.from('game_sessions')
                .select('*')
                .eq('game_pin', pin)
                .eq('status', 'lobby')
                .single();
            
            if (session) {
                currentSessionId = session.id;
                await sb.from('players').insert([{ session_id: session.id, nickname: nick }]);
                
                document.getElementById('join-ui').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                
                startRealtimeSubscription(session.id);
            } else {
                alert("Game not found! Check the PIN on the screen.");
            }
        }

        function startRealtimeSubscription(sid) {
            // Subscribe to the public channel for game_sessions
            const channel = sb.channel(`room-${sid}`)
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'game_sessions', 
                filter: `id=eq.${sid}` 
            }, (payload) => {
                console.log("Live Update:", payload.new);
                if (payload.new.status === 'playing') {
                    renderButtons(payload.new.current_question_id);
                }
            })
            .subscribe(async (status) => {
                console.log("Subscription status:", status);
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status-text').innerText = "Ready for the Quest!";
                    // Force Check: If game already started, show buttons immediately
                    const { data } = await sb.from('game_sessions').select('*').eq('id', sid).single();
                    if (data && data.status === 'playing') {
                        renderButtons(data.current_question_id);
                    }
                }
            });
        }

        async function renderButtons(correctId) {
            document.getElementById('status-text').innerText = "Pick the match!";
            document.getElementById('waiting-msg').style.display = 'none';
            
            // Fetch 4 choices from library
            const { data: choices } = await sb.from('content_library').select('*').limit(4);
            const grid = document.getElementById('choices');
            grid.innerHTML = '';
            
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'choice-btn';
                b.innerText = c.match_word;
                b.onclick = () => {
                    if (c.id === correctId) {
                        grid.innerHTML = "<h1 style='grid-column:span 2; color:green;'>✅ CORRECT!</h1>";
                    } else {
                        grid.innerHTML = "<h1 style='grid-column:span 2; color:red;'>❌ OOPS!</h1>";
                    }
                    setTimeout(() => { 
                        grid.innerHTML = ''; 
                        document.getElementById('status-text').innerText = "Waiting for Priest...";
                        document.getElementById('waiting-msg').style.display = 'block';
                    }, 2500);
                };
                grid.appendChild(b);
            });
        }
    </script>
</body>
</html>
